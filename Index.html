<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minha Bio</title>
  <style>
    :root {
      --font: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'Consolas', 'SF Mono', ui-monospace, monospace;
    }
    :root[data-theme="dark"] {
      --bg: #0d0d0f; --bg2: #141418; --card: #1a1a22;
      --border: #2a2a3a; --text: #f0eeff; --muted: #7a7a9a;
      --accent: #a78bfa; --accent2: #60a5fa;
      --shadow: 0 8px 40px rgba(0,0,0,0.6);
      --tag-bg: rgba(167,139,250,0.08);
    }
    :root[data-theme="light"] {
      --bg: #f5f3ff; --bg2: #ede9fe; --card: #ffffff;
      --border: #ddd6fe; --text: #1e1b4b; --muted: #6b7280;
      --accent: #7c3aed; --accent2: #2563eb;
      --shadow: 0 8px 40px rgba(124,58,237,0.10);
      --tag-bg: rgba(124,58,237,0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .emoji {
      display: inline-block;
      width: 1.15em; height: 1.15em;
      vertical-align: -0.2em;
    }
    .emoji-lg {
      display: block;
      width: 2.4rem; height: 2.4rem;
    }
    .emoji-sm {
      display: inline-block;
      width: 1em; height: 1em;
      vertical-align: -0.1em;
    }

    body {
      font-family: var(--font);
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1rem;
      transition: background 0.4s, color 0.4s;
      position: relative; overflow-x: hidden;
    }

    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.18;
      pointer-events: none; z-index: 0;
      animation: blobMove 8s ease-in-out infinite alternate;
    }
    .blob1 { width:420px; height:420px; background:var(--accent); top:-100px; left:-100px; }
    .blob2 { width:300px; height:300px; background:var(--accent2); bottom:-80px; right:-80px; animation-delay:3s; }
    @keyframes blobMove {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px,20px) scale(1.08); }
    }

    .toggle-wrap { position:fixed; top:1.2rem; right:1.4rem; z-index:100; }
    .toggle-btn {
      background:var(--card); border:1.5px solid var(--border);
      border-radius:50px; padding:0.4rem 1.1rem; cursor:pointer;
      font-family:var(--mono); font-size:0.78rem; color:var(--muted);
      display:flex; align-items:center; gap:0.5rem;
      transition:border 0.3s, color 0.3s; box-shadow:var(--shadow);
    }
    .toggle-btn:hover { color:var(--accent); border-color:var(--accent); }

    .card {
      position:relative; z-index:1;
      background:var(--card); border:1.5px solid var(--border);
      border-radius:28px; padding:2.8rem 2.4rem 2.4rem;
      max-width:420px; width:100%;
      box-shadow:var(--shadow); text-align:center;
      animation:fadeUp 0.7s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(40px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .page-tag {
      display:inline-block; font-family:var(--mono);
      font-size:0.7rem; letter-spacing:0.18em; text-transform:uppercase;
      color:var(--accent); background:var(--tag-bg);
      border:1px solid var(--border); border-radius:50px;
      padding:0.28rem 1rem; margin-bottom:1.6rem;
    }

    .avatar-wrap { margin:0 auto 1.2rem; width:90px; height:90px; position:relative; }
    .avatar-ring {
      position:absolute; inset:-4px; border-radius:50%;
      background:conic-gradient(var(--accent),var(--accent2),var(--accent));
      animation:spin 4s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .avatar-inner {
      position:relative; z-index:1;
      width:90px; height:90px; border-radius:50%;
      background:var(--bg2); border:3px solid var(--card);
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
    }

    h1 {
      font-size:1.7rem; font-weight:800;
      letter-spacing:-0.01em; line-height:1.1; margin-bottom:0.5rem;
      background:linear-gradient(135deg, var(--text) 40%, var(--accent));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .bio-text {
      font-family:var(--mono); font-size:0.82rem;
      color:var(--muted); line-height:1.8; margin-bottom:2rem;
    }

    .divider { border:none; border-top:1px solid var(--border); margin:0 0 1.8rem; }

    .links { display:flex; flex-direction:column; gap:0.9rem; }
    .link-btn {
      display:flex; align-items:center; gap:1rem;
      padding:0.9rem 1.3rem; border-radius:14px;
      border:1.5px solid var(--border); background:transparent;
      text-decoration:none; color:var(--text);
      font-family:var(--font); font-size:0.95rem; font-weight:700;
      transition:border-color 0.25s, background 0.25s, transform 0.2s, box-shadow 0.25s;
    }
    .link-btn:hover { transform:translateY(-2px); }
    .link-btn:active { transform:translateY(0); }

    .link-discord:hover { border-color:#5865F2; box-shadow:0 0 0 3px rgba(88,101,242,.13); background:rgba(88,101,242,.06); }
    .link-discord .link-icon { color:#5865F2; }
    .link-roblox:hover  { border-color:#bbb; box-shadow:0 0 0 3px rgba(200,200,200,.10); background:rgba(200,200,200,.05); }
    .link-roblox .link-icon  { color:var(--text); }
    .link-tiktok:hover  { border-color:#ff0050; box-shadow:0 0 0 3px rgba(255,0,80,.13); background:rgba(255,0,80,.06); }
    .link-tiktok .link-icon  { color:#ff0050; }

    .link-icon {
      width:36px; height:36px; display:flex; align-items:center; justify-content:center;
      flex-shrink:0; border-radius:9px; background:var(--tag-bg);
    }
    .link-info { text-align:left; }
    .link-name { display:block; font-size:0.98rem; font-weight:800; }
    .link-sub  { display:block; font-family:var(--mono); font-size:0.68rem; color:var(--muted); margin-top:1px; }
    .link-arrow { margin-left:auto; font-size:1rem; color:var(--muted); transition:transform 0.2s,color 0.2s; }
    .link-btn:hover .link-arrow { transform:translateX(4px); color:var(--accent); }

    .footer {
      margin-top:1.6rem; font-family:var(--mono);
      font-size:0.65rem; color:var(--muted); letter-spacing:0.1em; opacity:0.6;
      display:flex; align-items:center; justify-content:center; gap:0.3rem;
    }
  </style>
</head>

    </svg>`;

    const SVG_MOON = `<svg class="emoji-sm" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
      <path fill="#FFD983" d="M16 2a14 14 0 1 0 14 14A14 14 0 0 0 16 2z"/>

      <path fill="#F5F8FA" d="M30 16a14 14 0 0 1-19.6 12.8A14 14 0 0 0 24 6.3 14 14 0 0 1 30 16z"/>
    </svg>`;

    function toggleTheme() {
      isDark = !isDark;
      html.setAttribute('data-theme', isDark ? 'dark' : 'light');
      icon.innerHTML = isDark ? SVG_SUN : SVG_MOON;
      label.textContent = isDark ? 'Modo Claro' : 'Modo Escuro';
    }
